<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculadora</title>
</head>
<body>
    <main class="container">
        <div id="calculadora">
            <div id="text">
                <input type="text" value="0">
                <div id="calculos">
                    <span id="n1"></span> 
                    <span id="sinal"></span>
                    <span id="n2"></span>
                </div>
            </div>
            <div id="botoes" class="container">
                <div id="acoes">
                    <button class="operacoes" onclick="MoM()">+/-</button>
                    <button class="operacoes" onclick="CE()">CE</button>
                    <button class="operacoes" onclick="C()">C</button>
                    <button class="operacoes" onclick="del()">del</button>

                    <button class="num" onclick="introduzirDigito(1)">1</button>
                    <button class="num" onclick="introduzirDigito(2)">2</button>
                    <button class="num" onclick="introduzirDigito(3)">3</button>
                    <button class="operacoes" onclick="introduzirSinal('/')">/</button>
                    <button class="num" onclick="introduzirDigito(4)">4</button>
                    <button class="num" onclick="introduzirDigito(5)">5</button>
                    <button class="num" onclick="introduzirDigito(6)">6</button>
                    <button class="operacoes" onclick="introduzirSinal('x')">*</button>
                    <button class="num" onclick="introduzirDigito(7)">7</button>
                    <button class="num" onclick="introduzirDigito(8)">8</button>
                    <button class="num" onclick="introduzirDigito(9)">9</button>
                    <button class="operacoes" onclick="introduzirSinal('-')">-</button>
                    <button class="num" onclick="introduzirDigito('.')">.</button>
                    <button class="num" onclick="introduzirDigito(0)"> 0</button>
                    <button class="operacoes"  onclick="igual()">=</button>
                    <button class="operacoes" onclick="introduzirSinal('+')">+</button>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
