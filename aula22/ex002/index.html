<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="table.css">

    </head>
    <body>

<h2>Tabela de Frutas Tropicais</h2>
   <!-- Formulário para adicionar frutas -->
    <div class="form-container">
        <input type="text" id="fruta" placeholder="Fruta">
        <input type="text" id="cor" placeholder="Cor">
        <input type="text" id="sabor" placeholder="Sabor">
        <input type="text" id="origem" placeholder="Origem">
        <br>
        <button onclick="submit()">Guardar</button>
    </div>

    <!-- Tabela -->
    <table border="1">

        <tr>
            <th>Fruta</th>
            <th>Cor</th>
            <th>Sabor</th>
            <th>Origem</th>
        </tr>
        <tr>
            <td>Manga</td>
            <td>Amarela</td>
            <td>Doce</td>
            <td>Ásia</td>
        </tr>
        <tr>
            <td>Abacaxi</td>
            <td>Amarelo com casca verde</td>
            <td>Ácido e doce</td>
            <td>América do Sul</td>
        </tr>
        <tr>
            <td>Coco</td>
            <td>Marrom por fora, branco por dentro</td>
            <td>Suave</td>
            <td>Regiões tropicais</td>
        </tr>
        <tr>
            <td>Maracujá</td>
            <td>Roxo ou amarelo</td>
            <td>Ácido</td>
            <td>Brasil</td>
        </tr>
    </table>
    <script src="table.js">

    </script>
    </body>
    </html>
